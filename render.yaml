# render.yaml — Render Blueprint configuration
# This file tells Render how to deploy the Flask app as a web service.
services:
  - type: web
    name: brain-network-multilayer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # You'll set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
